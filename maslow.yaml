mas: "1.0"
project:
  name: seance
  description: "seance is a simple API backed webapp that allows users to look at their local Claude code conversation history."

refs:
  - kind: file
    path: docs/refs/vision.md
    description: "vision for the project"
  - kind: file
    path: docs/refs/mvp_requirements.md
    description: "mvp requirements for the project"
  - kind: file
    path: README.md
    description: "project readme with build/run instructions"
  - kind: file
    path: docs/adr/004-sessions-index-support.md
    description: "ADR for sessions-index.json support"
  - kind: file
    path: docs/adr/005-default-port-1692.md
    description: "ADR for default port choice"
checks:
  runner:
    - name: build
      kind: command
      run: "make build"
      timeout: 120s
      tags:
        - build
    - name: test
      kind: command
      run: "make test"
      timeout: 300s
      tags:
        - test
    - name: lint
      kind: command
      run: "make lint"
      timeout: 60s
      tags:
        - lint
    - name: binary-smoke
      kind: command
      run: |
        ./bin/seance --port 0 &
        PID=$!
        sleep 1
        kill $PID 2>/dev/null
        wait $PID 2>/dev/null
        exit 0
      timeout: 10s
      tags:
        - smoke
    - name: self-validate
      kind: command
      run: "maslow validate maslow.yaml"
      timeout: 30s
      tags:
        - self-host

profiles:
  quick:
    description: Fast checks for development
    checks:
      - build
      - lint
      - self-validate
  full:
    description: All checks including tests
    checks:
      - build
      - test
      - lint
      - smoke
      - self-validate

policy:
  deny:
    - "**/.env"
    - "**/credentials*"
    - "vendor/**"
  protected:
    - maslow.yaml
